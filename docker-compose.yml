services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "127.0.0.1:9092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - web-python-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-setup:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - web-python-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic cdp.events.v1 --partitions 1 --replication-factor 1
        echo "Kafka topics ready."
    restart: "no"

  otel-collector:
    image: grafana/otel-lgtm:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - lgtm-data:/data
    networks:
      - web-python-net

  ingest-bridge:
    image: gglamer/ingest-bridge:latest
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      INGEST_BRIDGE_HOST: 0.0.0.0
      INGEST_BRIDGE_PORT: "8080"
      INGEST_BRIDGE_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INGEST_BRIDGE_KAFKA_TOPIC: cdp.events.v1
      INGEST_BRIDGE_SOURCE_TOKEN: ${INGEST_BRIDGE_SOURCE_TOKEN:?INGEST_BRIDGE_SOURCE_TOKEN is required}
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    networks:
      - web-python-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  web-python-net:
    driver: bridge

volumes:
  lgtm-data:
